<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session Archive</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,200..900;1,200..900&display=swap');

  :root {
    --bg:        #2b3339;
    --bg1:       #323c41;
    --bg2:       #3a4248;
    --bg3:       #434f55;
    --bg4:       #4e5b62;
    --fg:        #d3c6aa;
    --fg-dim:    #859289;
    --green:     #a7c080;
    --teal:      #83c092;
    --blue:      #7fbbb3;
    --yellow:    #dbbc7f;
    --shadow:    rgba(0,0,0,0.35);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--bg);
    color: var(--fg);
    font-family: 'Crimson Pro', serif;
    font-size: 120%;
    font-size: 18px;
    line-height: 1.6;
    min-height: 100vh;
    padding: 0 0 80px 0;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 60px 24px 0;
  }

  .page-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    border-bottom: 1px solid var(--bg3);
    padding-bottom: 12px;
    margin-bottom: 32px;
  }

  .page-header h1 {
    font-size: 1.2rem;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--fg-dim);
  }

  .page-header a {
    font-size: 1.2rem;
    letter-spacing: 0.06em;
    color: var(--fg-dim);
    text-decoration: none;
  }

  .page-header a:hover { color: var(--blue); }

  .log-count {
    font-size: 1.2rem;
    color: var(--bg4);
    margin-bottom: 24px;
  }

  .log-status {
    font-size: 1.2rem;
    color: var(--fg-dim);
    font-style: italic;
    padding: 16px 0;
  }

  .log-entry {
    border-bottom: 1px solid var(--bg3);
    padding: 12px 0;
    display: grid;
    grid-template-columns: auto auto 1fr;
    align-items: baseline;
    gap: 0 14px;
  }

  .log-entry:last-child { border-bottom: none; }

  .log-entry-date {
    font-family: 'Crimson Pro', serif;
    font-size: 1.2rem;
    color: var(--green);
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  .log-entry-duration {
    font-family: 'Crimson Pro', serif;
    font-size: 1.2rem;
    color: var(--fg-dim);
    white-space: nowrap;
  }

  .log-entry-note {
    font-size: 1.2rem;
    color: var(--fg);
    line-height: 1.5;
  }

  @media (max-width: 520px) {
    .log-entry {
      grid-template-columns: auto auto;
      grid-template-rows: auto auto;
    }
    .log-entry-note {
      grid-column: 1 / -1;
      padding-top: 4px;
    }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="page-header">
    <h1>Session Archive</h1>
    <a href="index.html">← Back to timer</a>
  </div>

  <div id="logCount" class="log-count"></div>
  <div id="logContainer">
    <p class="log-status" id="logStatus">Loading…</p>
  </div>

</div>

<script>
const LOG_URL = 'https://raw.githubusercontent.com/dware837/sessiontimer/main/sessions.md';

const logContainer = document.getElementById('logContainer');
const logStatus    = document.getElementById('logStatus');
const logCountEl   = document.getElementById('logCount');

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function parseLog(md) {
  const raw = md.trim();
  if (!raw) return [];

  const blocks = raw.split(/\n(?=## )/);
  const entries = [];

  for (const block of blocks) {
    const lines = block.trim().split('\n');
    if (!lines[0]) continue;

    const header = lines[0].replace(/^##\s*/, '').trim();
    const body   = lines.slice(1).join('\n').trim();

    const match = header.match(/^(\d{4}-\d{2}-\d{2})\s*·\s*([\d:]+)\s*—\s*(.+)$/);
    let dateStr = '', timeStr = '', durStr = '';
    if (match) {
      dateStr = match[1];
      timeStr = match[2];
      durStr  = match[3].trim();
    } else {
      dateStr = header;
    }

    entries.push({ dateStr, timeStr, durStr, body });
  }

  return entries.reverse();
}

function renderLog(entries) {
  if (entries.length === 0) {
    logStatus.style.display = 'block';
    logStatus.textContent   = 'No sessions logged yet.';
    return;
  }

  logStatus.style.display = 'none';
  logCountEl.textContent  = `${entries.length} session${entries.length !== 1 ? 's' : ''}`;

  const frag = document.createDocumentFragment();

  entries.forEach((e) => {
    const div = document.createElement('div');
    div.className = 'log-entry';
    div.innerHTML = `
      <span class="log-entry-date">${escHtml(e.dateStr)}${e.timeStr ? ' · ' + escHtml(e.timeStr) : ''}</span>
      <span class="log-entry-duration">${escHtml(e.durStr)}</span>
      <span class="log-entry-note">${escHtml(e.body || '(no note)')}</span>
    `;
    frag.appendChild(div);
  });

  while (logContainer.firstChild) logContainer.removeChild(logContainer.firstChild);
  logContainer.appendChild(frag);
}

async function loadLog() {
  try {
    const res = await fetch(LOG_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    renderLog(parseLog(text));
  } catch(err) {
    logStatus.style.display = 'block';
    logStatus.innerHTML = `Could not load log. <br><small style="color:var(--bg4)">${err.message}</small>`;
  }
}

loadLog();
</script>
</body>
</html>
