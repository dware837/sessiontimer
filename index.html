<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session Timer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,200..900;1,200..900&display=swap');

  :root {
    --bg:        #2b3339;
    --bg1:       #323c41;
    --bg2:       #3a4248;
    --bg3:       #434f55;
    --bg4:       #4e5b62;
    --fg:        #d3c6aa;
    --fg-dim:    #859289;
    --green:     #a7c080;
    --teal:      #83c092;s
    --blue:      #7fbbb3;
    --yellow:    #dbbc7f;
    --orange:    #e69875;
    --red:       #e67e80;
    --purple:    #d699b6;
    --shadow:    rgba(0,0,0,0.35);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background-color: var(--bg);
    color: var(--fg);
    font-family: 'Crimson Pro', serif;
    font-size: 120%;
    font-size: 18px;
    line-height: 1.6;
    min-height: 100vh;
    padding: 0 0 80px 0;
  }

  /* subtle grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 60px 24px 0;
  }

  /* ── Header ── */
  header {
    text-align: center;
    margin-bottom: 52px;
  }

  header h1 {
    font-size: 2rem;
    font-weight: 300;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--fg-dim);
    font-style: italic;
  }

  header .rule {
    width: 48px;
    height: 1px;
    background: var(--green);
    margin: 14px auto 0;
    opacity: 0.5;
  }

  /* ── Timer card ── */
  .card {
    background: var(--bg1);
    border: 1px solid var(--bg3);
    border-radius: 4px;
    padding: 40px 40px 36px;
    box-shadow: 0 4px 24px var(--shadow);
  }

  /* Timer display */
  .timer-display {
    text-align: center;
    margin-bottom: 32px;
  }

  .timer-face {
    font-family: 'Crimson Pro', serif;
    font-size: 5.5rem;
    font-weight: 300;
    letter-spacing: 0.04em;
    color: var(--fg);
    line-height: 1;
    transition: color 0.4s ease;
    user-select: none;
  }

  .timer-face.running { color: var(--green); }
  .timer-face.ending  { color: var(--yellow); }
  .timer-face.done    { color: var(--orange); }

  /* Input row */
  .set-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 28px;
  }

  .set-row label {
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--fg-dim);
  }

  .set-row input[type="number"] {
    width: 68px;
    background: var(--bg2);
    border: 1px solid var(--bg4);
    border-radius: 3px;
    color: var(--fg);
    font-family: 'Crimson Pro', serif;
    font-size: 1.1rem;
    padding: 6px 10px;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }

  .set-row input[type="number"]::-webkit-inner-spin-button,
  .set-row input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

  .set-row input[type="number"]:focus { border-color: var(--green); }

  .sep {
    font-family: 'Crimson Pro', serif;
    color: var(--fg-dim);
    font-size: 1.1rem;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 32px;
  }

  .btn {
    font-family: 'Crimson Pro', serif;
    font-size: 0.95rem;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 9px 28px;
    border-radius: 3px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s, opacity 0.15s;
  }

  .btn-primary {
    background: var(--green);
    color: var(--bg);
    border-color: var(--green);
  }
  .btn-primary:hover { background: var(--teal); border-color: var(--teal); }

  .btn-ghost {
    background: transparent;
    color: var(--fg-dim);
    border-color: var(--bg4);
  }
  .btn-ghost:hover { color: var(--fg); border-color: var(--fg-dim); }

  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* Session note area */
  .note-section {
    position: relative;
  }

  .note-label {
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--fg-dim);
    margin-bottom: 8px;
    display: block;
  }

  textarea {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--bg4);
    border-radius: 3px;
    color: var(--fg);
    font-family: 'Crimson Pro', serif;
    font-size: 1rem;
    line-height: 1.6;
    padding: 12px 14px;
    resize: vertical;
    min-height: 90px;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--green); }

  textarea.copyable {
    border-color: var(--yellow);
    background: var(--bg);
    font-family: 'Crimson Pro', serif;
    font-size: 0.85rem;
    color: var(--yellow);
    cursor: text;
  }

  .copy-hint {
    font-size: 0.78rem;
    color: var(--yellow);
    letter-spacing: 0.06em;
    margin-top: 8px;
    opacity: 0;
    transition: opacity 0.4s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .copy-hint.visible { opacity: 1; }

  .copy-hint button {
    font-family: 'Crimson Pro', serif;
    font-size: 1rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--yellow);
    color: var(--yellow);
    border-radius: 2px;
    padding: 2px 10px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .copy-hint button:hover {
    background: var(--yellow);
    color: var(--bg);
  }

  /* ── Log section ── */
  .log-section {
    margin-top: 52px;
  }

  .log-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--bg3);
    padding-bottom: 12px;
  }

  .log-header h2 {
    font-size: 1rem;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--fg-dim);
  }

  .log-count {
    font-family: 'Crimson Pro', serif;
    font-size: 1rem;
    color: var(--bg4);
  }

  .log-status {
    font-size: 1rem;
    color: var(--fg-dim);
    font-style: italic;
    padding: 16px 0;
  }

  .log-status a {
    color: var(--blue);
    text-decoration: none;
  }
  .log-status a:hover { text-decoration: underline; }

  /* Log entries */
  .log-entry {
    border-bottom: 1px solid var(--bg3);
    padding: 12px 0;
    display: grid;
    grid-template-columns: auto auto 1fr;
    align-items: baseline;
    gap: 0 14px;
  }

  .log-entry:last-child { border-bottom: none; }

  .log-entry-date {
    font-family: 'Crimson Pro', serif;
    font-size: 1rem;
    color: var(--green);
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  .log-entry-duration {
    font-family: 'Crimson Pro', serif;
    font-size: 1rem;
    color: var(--fg-dim);
    white-space: nowrap;
  }

  .log-entry-note {
    font-size: 0.92rem;
    color: var(--fg);
    line-height: 1.5;
  }

  .log-archive-link {
    display: block;
    margin-top: 20px;
    font-size: 1rem;
    letter-spacing: 0.06em;
    color: var(--fg-dim);
    text-decoration: none;
    text-align: right;
  }

  .log-archive-link:hover { color: var(--blue); }

  /* responsive */
  @media (max-width: 520px) {
    .card { padding: 28px 20px 24px; }
    .timer-face { font-size: 4rem; }
    .log-entry-preview { max-width: 140px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="card">

    <!-- Clock -->
    <div class="timer-display">
      <div class="timer-face" id="timerFace">00:00</div>
    </div>

    <!-- Set duration -->
    <div class="set-row">
      <label for="inputH">Set</label>
      <input type="number" id="inputH" min="0" max="23" value="0" placeholder="0">
      <span class="sep">h</span>
      <input type="number" id="inputM" min="0" max="59" value="25" placeholder="25">
      <span class="sep">m</span>
      <input type="number" id="inputS" min="0" max="59" value="0" placeholder="0">
      <span class="sep">s</span>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="btn btn-primary" id="btnStart">Start</button>
      <button class="btn btn-ghost"   id="btnPause"  disabled>Pause</button>
      <button class="btn btn-ghost"   id="btnReset"  disabled>Reset</button>
    </div>

    <!-- Note / copyable output -->
    <div class="note-section">
      <span class="note-label" id="noteLabel">Session note</span>
      <textarea id="noteArea" placeholder="What are you working on this session?"></textarea>
      <div class="copy-hint" id="copyHint">
        <span>Timer complete — paste this line into your log file on GitHub.</span>
        <button id="btnCopy">Copy</button>
      </div>
    </div>

  </div>

  <!-- Log -->
  <div class="log-section">
    <div class="log-header">
      <h2>Session Logs</h2>
      <span class="log-count" id="logCount"></span>
    </div>
    <div id="logContainer">
      <p class="log-status" id="logStatus">Loading log…</p>
    </div>
  </div>

</div>

<script>
// ─────────────────────────────────────────
// CONFIG — replace with your actual raw GitHub URL once you've created the repo.
// It should look like:
// https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/sessions.md
// ─────────────────────────────────────────
const LOG_URL = 'https://raw.githubusercontent.com/dware837/sessiontimer/main/sessions.md';

// ── State ──
let totalSeconds   = 0;
let remainSeconds  = 0;
let timerInterval  = null;
let isRunning      = false;
let sessionDone    = false;
let logLine        = '';

// ── Elements ──
const face       = document.getElementById('timerFace');

const inputH     = document.getElementById('inputH');
const inputM     = document.getElementById('inputM');
const inputS     = document.getElementById('inputS');
const btnStart   = document.getElementById('btnStart');
const btnPause   = document.getElementById('btnPause');
const btnReset   = document.getElementById('btnReset');
const noteArea   = document.getElementById('noteArea');
const noteLabel  = document.getElementById('noteLabel');
const copyHint   = document.getElementById('copyHint');
const btnCopy    = document.getElementById('btnCopy');
const logCount   = document.getElementById('logCount');
const logStatus  = document.getElementById('logStatus');
const logContainer = document.getElementById('logContainer');

const CIRCUMFERENCE = 2 * Math.PI * 72; // ~452.4

// ── Helpers ──
function pad(n) { return String(n).padStart(2, '0'); }

function formatDisplay(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  if (h > 0) return `${pad(h)}:${pad(m)}:${pad(s)}`;
  return `${pad(m)}:${pad(s)}`;
}

function formatDuration(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  const parts = [];
  if (h > 0) parts.push(`${h}h`);
  if (m > 0) parts.push(`${m}m`);
  if (s > 0 && h === 0) parts.push(`${s}s`);
  return parts.join(' ') || '0s';
}

function formatDate(d) {
  return d.toISOString().slice(0,10);
}

function formatTime(d) {
  return d.toTimeString().slice(0,5);
}

function setColorState(state) {
  face.className = 'timer-face ' + state;
}

function updateDisplay() {
  face.textContent = formatDisplay(remainSeconds);

  if (!isRunning && remainSeconds === totalSeconds) {
    setColorState('');
  } else if (remainSeconds <= 60 && remainSeconds > 0) {
    setColorState('ending');
  } else if (remainSeconds === 0) {
    setColorState('done');
  } else {
    setColorState('running');
  }
}

// ── Bell sound (Web Audio API) ──
function playBell() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    function tone(freq, startTime, duration, gainPeak) {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);

      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, startTime);

      gain.gain.setValueAtTime(0, startTime);
      gain.gain.linearRampToValueAtTime(gainPeak, startTime + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);

      osc.start(startTime);
      osc.stop(startTime + duration);
    }

    // Soft three-note bowl-like chord, staggered
    const now = ctx.currentTime;
    tone(523.25, now,        3.2, 0.18); // C5
    tone(659.25, now + 0.18, 2.8, 0.12); // E5
    tone(783.99, now + 0.36, 2.4, 0.09); // G5
  } catch(e) {
    // Audio not available — fail silently
  }
}

// ── Timer logic ──
function getInputSeconds() {
  const h = parseInt(inputH.value) || 0;
  const m = parseInt(inputM.value) || 0;
  const s = parseInt(inputS.value) || 0;
  return h * 3600 + m * 60 + s;
}

function startTimer() {
  if (sessionDone) return;

  if (!isRunning && remainSeconds === 0) {
    const t = getInputSeconds();
    if (t === 0) return;
    totalSeconds  = t;
    remainSeconds = t;
  }

  isRunning = true;
  btnStart.disabled  = true;
  btnPause.disabled  = false;
  btnReset.disabled  = false;
  inputH.disabled = inputM.disabled = inputS.disabled = true;

  timerInterval = setInterval(() => {
    if (remainSeconds <= 0) {
      clearInterval(timerInterval);
      isRunning = false;
      onTimerComplete();
      return;
    }
    remainSeconds--;
    updateDisplay();
  }, 1000);

  updateDisplay();
}

function pauseTimer() {
  if (!isRunning) return;
  clearInterval(timerInterval);
  isRunning = false;
  btnStart.textContent  = 'Resume';
  btnStart.disabled     = false;
  btnPause.disabled     = true;
}

function resetTimer() {
  clearInterval(timerInterval);
  isRunning     = false;
  sessionDone   = false;
  remainSeconds = 0;
  totalSeconds  = 0;

  btnStart.textContent  = 'Start';
  btnStart.disabled     = false;
  btnPause.disabled     = true;
  btnReset.disabled     = true;
  inputH.disabled = inputM.disabled = inputS.disabled = false;

  face.textContent = '00:00';

  setColorState('');

  noteLabel.textContent = 'Session note';
  noteArea.value        = '';
  noteArea.classList.remove('copyable');
  noteArea.readOnly     = false;
  copyHint.classList.remove('visible');
  logLine = '';
}

function onTimerComplete() {
  sessionDone = true;
  updateDisplay();
  playBell();

  btnStart.disabled = true;
  btnPause.disabled = true;
  btnReset.disabled = false;

  const now      = new Date();
  const dateStr  = formatDate(now);
  const timeStr  = formatTime(now);
  const durStr   = formatDuration(totalSeconds);
  const note     = noteArea.value.trim() || '(no note)';

  // Build the markdown log line
  // Format:
  // ## 2026-03-30 · 14:22 — 45m
  // Writing: cover letter draft for Nevada SHPO
  logLine = `## ${dateStr} · ${timeStr} — ${durStr}\n${note}`;

  noteArea.value    = logLine;
  noteArea.classList.add('copyable');
  noteArea.readOnly = true;
  noteLabel.textContent = 'Copy this line — paste it into sessions.md on GitHub';
  copyHint.classList.add('visible');
}

// ── Copy button ──
btnCopy.addEventListener('click', () => {
  navigator.clipboard.writeText(logLine).then(() => {
    btnCopy.textContent = 'Copied';
    setTimeout(() => { btnCopy.textContent = 'Copy'; }, 2000);
  }).catch(() => {
    noteArea.select();
    document.execCommand('copy');
    btnCopy.textContent = 'Copied';
    setTimeout(() => { btnCopy.textContent = 'Copy'; }, 2000);
  });
});

// ── Button listeners ──
btnStart.addEventListener('click', startTimer);
btnPause.addEventListener('click', pauseTimer);
btnReset.addEventListener('click', resetTimer);

// ── Log fetching and rendering ──
function parseLog(md) {
  // Split on ## headers
  const raw = md.trim();
  if (!raw) return [];

  const blocks = raw.split(/\n(?=## )/);
  const entries = [];

  for (const block of blocks) {
    const lines = block.trim().split('\n');
    if (!lines[0]) continue;

    // Header line: ## 2026-03-30 · 14:22 — 45m
    const header = lines[0].replace(/^##\s*/, '').trim();
    const body   = lines.slice(1).join('\n').trim();

    // Parse date and duration from header
    // Pattern: DATE · TIME — DURATION
    const match = header.match(/^(\d{4}-\d{2}-\d{2})\s*·\s*([\d:]+)\s*—\s*(.+)$/);
    let dateStr = '', timeStr = '', durStr = '', preview = '';
    if (match) {
      dateStr = match[1];
      timeStr = match[2];
      durStr  = match[3].trim();
    } else {
      dateStr = header;
    }
    preview = body.split('\n')[0] || '';

    entries.push({ dateStr, timeStr, durStr, preview, body, header });
  }

  // Most recent first
  return entries.reverse();
}

function renderLog(entries, limit) {
  const shown = limit ? entries.slice(0, limit) : entries;

  if (shown.length === 0) {
    logStatus.style.display = 'block';
    logStatus.innerHTML     = 'No sessions logged yet. Complete a session and paste the generated line into <code>sessions.md</code> in your GitHub repo.';
    logCount.textContent    = '';
    return;
  }

  logStatus.style.display = 'none';
  logCount.textContent    = `${entries.length} session${entries.length !== 1 ? 's' : ''}`;

  const frag = document.createDocumentFragment();

  shown.forEach((e) => {
    const div = document.createElement('div');
    div.className = 'log-entry';
    div.innerHTML = `
      <span class="log-entry-date">${escHtml(e.dateStr)}${e.timeStr ? ' · ' + escHtml(e.timeStr) : ''}</span>
      <span class="log-entry-duration">${escHtml(e.durStr)}</span>
      <span class="log-entry-note">${escHtml(e.body || '(no note)')}</span>
    `;
    frag.appendChild(div);
  });

  while (logContainer.firstChild) logContainer.removeChild(logContainer.firstChild);
  logContainer.appendChild(frag);

  if (entries.length > 10) {
    const link = document.createElement('a');
    link.className = 'log-archive-link';
    link.href      = 'archive.html';
    link.textContent = 'View full archive →';
    logContainer.appendChild(link);
  }
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function loadLog() {
  if (LOG_URL === 'YOUR_RAW_GITHUB_URL_HERE') {
    logStatus.style.display = 'block';
    logStatus.innerHTML     = 'Log URL not yet configured. See the comment at the top of the &lt;script&gt; block.';
    return;
  }

  try {
    const res = await fetch(LOG_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const entries = parseLog(text);
    renderLog(entries, 10);
  } catch(err) {
    logStatus.style.display = 'block';
    logStatus.innerHTML     = `Could not load log. Check that the URL is correct and the file is publicly accessible. <br><small style="color:var(--bg4)">${err.message}</small>`;
  }
}

// Initialise
updateDisplay();
loadLog();
</script>
</body>
</html>
